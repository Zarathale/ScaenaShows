id: show_bday_medium
name: "Birthday Medium"
description: "A fuller arc: opening -> gratitude -> pastel sparkle -> coda."
default_mode: follow
default_audience: broadcast

bossbar:
  enabled: true
  title: "<gold>🎂 Birthday Show</gold>"
  color: YELLOW
  overlay: PROGRESS
  audience: broadcast

timeline:
  - at: 0
    type: SCENE
    scene: opening

  - at: 220
    type: SCENE
    scene: gratitude

  - at: 460
    type: SEQUENCE
    sequence: bday_sparkle_cascade

  - at: 720
    type: SCENE
    scene: coda
