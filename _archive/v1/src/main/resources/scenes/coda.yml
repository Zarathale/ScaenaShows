id: coda
name: "Coda"
duration_ticks: 200

events:
  - at: 0
    type: SOUND
    sound: { id: "minecraft:entity.experience_orb.pickup", category: master, volume: 1.0, pitch: 0.95 }

  - at: 10
    type: SOUND
    sound: { id: "minecraft:block.note_block.chime", category: master, volume: 2.0, pitch: 0.9 }

  - at: 40
    type: MESSAGE
    audience: broadcast
    message: "<gold>Thanks for making this world more beautiful.</gold> <white>🎂✨</white>"

  - at: 80
    type: BOSSBAR
    audience: broadcast
    bossbar:
      action: hide
