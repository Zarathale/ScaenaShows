id: peak
name: "Peak"
duration_ticks: 240

scene_text: "<gold>Celebrate!</gold>"

events:
  - at: 0
    type: BOSSBAR
    audience: broadcast
    bossbar:
      title: "<gold>🎂 Celebration</gold>"
      color: YELLOW
      overlay: PROGRESS
      action: show

  - at: 10
    type: SOUND
    sound: { id: "minecraft:block.bell.use", category: master, volume: 1.0, pitch: 0.95 }

  - at: 20
    type: PARTICLE
    particle: { id: "fireworks_spark", count: 120, offset: [1.2, 1.3, 1.2], extra: 0.03, force: true }

  # 12 seconds of 1 firework/second
  - at: 20
    type: SEQUENCE
    sequence: bday_one_per_second_12s

  # Sparkle pulses to keep the scene visually alive
  - at: 40
    type: PARTICLE
    particle: { id: "end_rod", count: 18, offset: [0.9, 1.2, 0.9], extra: 0.02, force: true }
  - at: 60
    type: PARTICLE
    particle: { id: "end_rod", count: 18, offset: [0.9, 1.2, 0.9], extra: 0.02, force: true }
  - at: 80
    type: PARTICLE
    particle: { id: "end_rod", count: 18, offset: [0.9, 1.2, 0.9], extra: 0.02, force: true }
  - at: 100
    type: PARTICLE
    particle: { id: "end_rod", count: 18, offset: [0.9, 1.2, 0.9], extra: 0.02, force: true }
  - at: 120
    type: PARTICLE
    particle: { id: "end_rod", count: 18, offset: [0.9, 1.2, 0.9], extra: 0.02, force: true }
  - at: 140
    type: PARTICLE
    particle: { id: "end_rod", count: 18, offset: [0.9, 1.2, 0.9], extra: 0.02, force: true }
  - at: 160
    type: PARTICLE
    particle: { id: "end_rod", count: 18, offset: [0.9, 1.2, 0.9], extra: 0.02, force: true }
  - at: 180
    type: PARTICLE
    particle: { id: "end_rod", count: 18, offset: [0.9, 1.2, 0.9], extra: 0.02, force: true }
  - at: 200
    type: PARTICLE
    particle: { id: "end_rod", count: 18, offset: [0.9, 1.2, 0.9], extra: 0.02, force: true }
  - at: 220
    type: PARTICLE
    particle: { id: "end_rod", count: 18, offset: [0.9, 1.2, 0.9], extra: 0.02, force: true }

  - at: 25
    type: SOUND
    sound: { id: "minecraft:entity.firework_rocket.launch", category: master, volume: 1.0, pitch: 1.0 }
