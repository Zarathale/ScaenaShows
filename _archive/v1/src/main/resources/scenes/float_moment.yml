id: float_moment
name: "Float Moment"
duration_ticks: 260

events:
  - at: 0
    type: MESSAGE
    audience: broadcast
    message: "<gray>Okay... just for a moment...</gray> <gold>lift off.</gold>"

  - at: 5
    type: EFFECT
    effect: { id: "levitation", duration_ticks: 60, amplifier: 0, hide_particles: true }

  - at: 70
    type: EFFECT
    effect: { id: "slow_falling", duration_ticks: 200, amplifier: 0, hide_particles: true }

  - at: 80
    type: PARTICLE
    particle: { id: "minecraft:end_rod", count: 60, offset: [1.0, 1.0, 1.0], extra: 0.02, force: true }

  - at: 90
    type: SOUND
    sound: { id: "minecraft:block.note_block.chime", category: master, volume: 2.0, pitch: 1.25 }
