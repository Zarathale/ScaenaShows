id: wonder
name: "Wonder"
duration_ticks: 220

events:
  - at: 0
    type: TITLE
    audience: broadcast
    title:
      title: "<gold>ScaenaCraft</gold>"
      subtitle: "<gray>Something intentional. Something beautiful.</gray>"
      fade_in: 10
      stay: 60
      fade_out: 10

  - at: 10
    type: SOUND
    sound: { id: "minecraft:block.note_block.chime", category: master, volume: 2.0, pitch: 1.1 }

  - at: 80
    type: PARTICLE
    particle: { id: "minecraft:firework", count: 70, offset: [0.8, 1.0, 0.8], extra: 0.03, force: true }

  - at: 90
    type: SOUND
    sound: { id: "minecraft:entity.villager.yes", category: master, volume: 1.0, pitch: 1.0 }
