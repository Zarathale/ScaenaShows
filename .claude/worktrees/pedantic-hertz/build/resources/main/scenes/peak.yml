id: peak
name: "Peak"
duration_ticks: 240

events:
  - at: 0
    type: BOSSBAR
    audience: broadcast
    bossbar:
      title: "<gold>🎂 Celebration</gold>"
      color: YELLOW
      overlay: PROGRESS
      action: show

  - at: 10
    type: SOUND
    sound: { id: "minecraft:block.bell.use", category: master, volume: 1.0, pitch: 0.95 }

  - at: 20
    type: PARTICLE
    particle: { id: "minecraft:firework", count: 120, offset: [1.2, 1.3, 1.2], extra: 0.03, force: true }

  - at: 25
    type: SOUND
    sound: { id: "minecraft:entity.firework_rocket.launch", category: master, volume: 1.0, pitch: 1.0 }
