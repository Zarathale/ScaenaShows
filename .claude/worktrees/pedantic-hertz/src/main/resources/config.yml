version: 1

defaults:
  mode: follow                # follow|static
  broadcast: true             # show messages to everyone by default
  bossbar:
    enabled: true
    color: YELLOW
    overlay: PROGRESS

permissions:
  admin_permission: "scae.shows.admin"
  play_permission: "scae.shows.play"
  target_others_permission: "scae.shows.target.others"
  target_all_permission: "scae.shows.target.all"
  private_flag_permission: "scae.shows.private"

cooldowns:
  default_seconds: 60
  bypass_permission: "scae.shows.cooldown.bypass"

pause_resume:
  resume_window_seconds: 900  # 15 minutes

safety:
  stop_applies_slow_falling_seconds: 10
  stop_message: "<gold>Show stopped.</gold> <gray>Landing safely.</gray>"
  stop_sound:
    id: "minecraft:entity.experience_orb.pickup"
    category: master
    volume: 1.0
    pitch: 1.0

limits:
  max_events_per_show: 2000
  max_fireworks_per_second: 30
  max_fireworks_per_shot: 12
  max_sequence_nesting_depth: 4
  max_particles_per_event: 200
