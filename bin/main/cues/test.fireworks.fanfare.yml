# ScaenaShows v2 — Cue: test.fireworks.fanfare
# Grand finale firework sequence. Used as a CUE reference at the end of the test show.
# Combines a V-fan, a rainbow circle, and a random scatter burst — all within 3 seconds.

id: test.fireworks.fanfare
name: "Test — Grand Fanfare"
description: "Finale firework sequence: V-fan + rainbow circle + random scatter. ~3 seconds."
duration_ticks: 65
tags: [effect:fireworks-heavy, arc:peak, tone:warm, intensity:intense]

timeline:

  # V-fan opening: two symmetric arms flaring outward simultaneously
  - type: FIREWORK_FAN
    at: 0
    origin_offset: {x: 0, z: 0}
    arms:
      - angle: 315      # northwest arm
        length: 9
        count: 4
        preset: scae_large_fanfare
      - angle: 45       # northeast arm
        length: 9
        count: 4
        preset: scae_star_warm
    y_mode: surface
    y_offset: 2
    chase:
      enabled: true
      direction: FL
      interval_ticks: 3
      mode: simultaneous    # both arms chase at the same time

  # Rainbow circle expands outward over the fan's bloom zone
  - type: FIREWORK_CIRCLE
    at: 15
    preset: scae_burst_leaf
    origin_offset: {x: 0, z: 0}
    radius: 10
    count: 12
    y_mode: surface
    y_offset: 3
    chase:
      enabled: true
      direction: FL
      interval_ticks: 3
    power_variation: ALTERNATE
    color_variation: RAINBOW

  # Random scatter fills in the gaps with warm gold sparks
  - type: FIREWORK_RANDOM
    at: 30
    preset: scae_ball_spark
    origin_offset: {x: 0, z: 0}
    radius: 14
    count: 10
    y_mode: surface
    y_offset: 1
    seed: 42       # reproducible scatter every run

  # Second random burst slightly offset for depth
  - type: FIREWORK_RANDOM
    at: 42
    preset: scae_star_warm
    origin_offset: {x: 0, z: 0}
    radius: 8
    count: 6
    y_mode: surface
    y_offset: 4
    seed: null     # different positions every run — intentional contrast with the seeded one above
