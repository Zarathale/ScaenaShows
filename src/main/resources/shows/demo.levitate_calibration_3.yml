id: demo.levitate_calibration_3
name: "Levitate Calibration v3 — Quasi-Hover"
description: >
  Eight iterations alternating levitation pulses with slow_falling gaps.
  Goal: locate the cycle ratio where player rise equals descent (quasi-hover).
  Each section: 4s amp-9 safety lift, then 22s of lev+fall cycling.
  Bossbar labels each section with parameters. No PLAYER_FLIGHT used.
  Record: climbing / hovering / falling for each section.
  Amp 0 and amp 1. Lev durations 20t and 40t. Gaps 4t-40t.
  Physics baseline: slow_falling ~2 b/s. Amp 0 x 20t ~0.8b rise.
portable: true
default_mode: static
default_audience: participants
group_count: 1
group_strategy: join_order
tags: [test, calibration, aerial, effect-driven]
meta:
  created_by: Zara
  created_at: 2026-03-24
  last_edited_by: Zara
  last_edited_at: 2026-03-24
bossbar:
  enabled: true
  title: "<gray>Hover Cal v3</gray>"
  color: WHITE
  overlay: PROGRESS
  audience: participants
  fade_in_ticks: 10
  fade_out_ticks: 20
# Total: 4740 ticks (~237s / ~3m 57s)
duration_ticks: 4740
