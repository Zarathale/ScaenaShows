    type: EFFECT
    effect_id: slow_falling
    duration_ticks: 2000
    amplifier: 0
    hide_particles: true
    audience: participants

  - at: 220
    type: MESSAGE
    text: "<aqua>[ A ] DROPPING — note your landing second ↓</aqua>"
    audience: participants

  # Drop timer: T=220 is second 0. Pings at 220, 240, 260... (every 20 ticks = 1 second)
