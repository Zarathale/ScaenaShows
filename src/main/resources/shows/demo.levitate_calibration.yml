id: demo.levitate_calibration
name: "Levitate Calibration"
description: >
  Structured calibration run for the levitation/slow_falling system.
  Four sections, each with a known lift and an 18-second fall timer.
  Second counts appear on-screen (ACTION_BAR) every tick, with audio
  pings every second and bell tones at 5s/10s/15s marks.
  Note the second you land for each section. Report back to Claude.
  Results drive pulse timing, hover heights, and slow_fall constants
  for all future authoring.
portable: true
default_mode: static
default_audience: participants
group_count: 1
group_strategy: join_order

tags: [test, calibration, aerial, effect-driven]

meta:
  created_by: Zara
  created_at: 2026-03-24
  last_edited_by: Zara
  last_edited_at: 2026-03-24

bossbar:
  enabled: true
  title: "<gray>Levitate Calibration</gray>"
  color: WHITE
  overlay: PROGRESS
  audience: participants
  fade_in_ticks: 10
  fade_out_ticks: 20

# Total: ~2340 ticks (~117 seconds / ~2 minutes)
duration_ticks: 2340

timeline:

  # ═══════════════════════════════════════════════════════════════════════
  # INTRO
  # ═══════════════════════════════════════════════════════════════════════

  - at: 0
    type: WEATHER
    mode: clear

  - at: 0
    type: MESSAGE
    text: "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
    audience: participants

  - at: 5
    type: MESSAGE
    text: "<white><bold>Levitate Calibration</bold></white>"
    audience: participants

  - at: 10
    type: MESSAGE
    text: "<gray>Four sections. Each lifts you, then drops you.</gray>"
    audience: participants

  - at: 30
    type: MESSAGE
    text: "<gray>Watch the timer. Note the second you land.</gray>"
    audience: participants

  - at: 50
    type: MESSAGE
    text: "<gray>Pings every second. Bell at 5s, 10s, 15s.</gray>"
    audience: participants

  - at: 70
    type: MESSAGE
    text: "<gray>Open the run sheet. Four data fields to fill.</gray>"
    audience: participants

  - at: 90
    type: MESSAGE
    text: "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
    audience: participants

  # ═══════════════════════════════════════════════════════════════════════
  # SECTION A: 5 pulses × amp 0, 20t each — minimal lift
  # Expected: ~5 blocks. Expected fall time: fast (probably 3–8s).
  # ═══════════════════════════════════════════════════════════════════════

  - at: 110
    type: BOSSBAR
    title: "<aqua>A — 5 pulses, amp 0  |  landing second → ?</aqua>"
    color: BLUE
    overlay: NOTCHED_6
    duration_ticks: 500
    fade_in_ticks: 5
    fade_out_ticks: 20
    audience: participants

  - at: 110
    type: MESSAGE
    text: "<aqua>[ A ] 5 pulses, amp 0 (20t each). Lift begins.</aqua>"
    audience: participants

  # 5 pulses: 110, 132, 154, 176, 198
  - at: 110
    type: EFFECT
    effect_id: levitation
    duration_ticks: 20
    amplifier: 0
    hide_particles: false
    audience: participants

  - at: 132
    type: EFFECT
    effect_id: levitation
    duration_ticks: 20
    amplifier: 0
    hide_particles: false
    audience: participants

