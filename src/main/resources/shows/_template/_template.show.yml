id: SHOW_ID
name: "SHOW NAME"
description: "One-sentence description of what this show is and its current revision."
duration_ticks: 0    # set before first in-game test

meta:
  created_by: BUILDER_NAME    # Zara | Smitty
  created_at: YYYY-MM-DD
  last_edited_by: BUILDER_NAME
  last_edited_at: YYYY-MM-DD

portable: true
default_mode: static
default_audience: broadcast
group_count: 1
group_strategy: join_order
front: south               # compass direction that defines downstage

bossbar:
  enabled: false

