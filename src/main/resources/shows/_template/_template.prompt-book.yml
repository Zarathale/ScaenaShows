  #   locked: false

# ─────────────────────────────────────────────────────────────────────────────
# READINESS
# Overall production state tracker. Stage Management owns this block.
# ─────────────────────────────────────────────────────────────────────────────
readiness:
  overall: pending               # pending | in-progress | yaml-ready | production
  casting: pending               # pending | locked
  wardrobe: pending
  set: pending
  lighting: pending
  fireworks: pending
  voice: pending
