# ScaenaShows v2 — Show: intro.scaena_sprite
# ─────────────────────────────────────────────────────────────────────
# BEHIND THE CURTAIN — A ScaenaSprite Introduction
#
# ScaenaSprite wakes up, introduces itself, pulls back the curtain to show
# how the engine works, walks you across the stage, shifts the mood three
# times, then hands the stage over to you.
#
# Scene timeline (ticks → seconds):
#   T0–400    ( 0–20s)  THE EMPTY STAGE  — dark, ambient, anticipatory
#   T400–700  (20–35s)  THE ARRIVAL      — lightning, flash, first title
#   T700–1200 (35–60s)  HELLO            — Sprite introduces itself; warm light
#   T1200–1800(60–90s)  THE ARCHITECTURE — pulls back the curtain; explains Cues
#   T1800–2500(90–125s) YOUR STAGE       — movement across stage marks
#   T2500–3000(125–150s)THE MOODS        — wonder → melancholy → joy
#   T3000–3300(150–165s)THE INVITATION   — hands the stage to the player
#   T3300–3600(165–180s)FINALE           — grand send-off
# ─────────────────────────────────────────────────────────────────────

id: intro.scaena_sprite
name: "Behind the Curtain — A ScaenaSprite Intro"
description: "ScaenaSprite wakes up, explains the engine, walks you across the stage, shifts through three moods, then invites you to create. ~3 minutes."
duration_ticks: 3600

portable: true
default_mode: static
default_audience: broadcast
group_count: 1
group_strategy: join_order
front: south

bossbar:
  enabled: true
  title: "<dark_gray>✦  Behind the Curtain</dark_gray>"
  color: WHITE
  overlay: PROGRESS
  fade_in_ticks: 40
  fade_out_ticks: 60
  audience: broadcast

# Stage marks — offsets from spatial anchor (the player's starting position).
# Named for clarity; movement section below walks them in sequence.
marks:
  center:
    offset: {x: 0, y: 0, z: 0}
  west:
    offset: {x: -10, y: 0, z: 0}
  east:
    offset: {x: 10, y: 0, z: 0}
  upstage:
    offset: {x: 0, y: 0, z: -10}
  downstage:
    offset: {x: 0, y: 0, z: 8}
  stage_left:
    offset: {x: -6, y: 0, z: 3}
  stage_right:
    offset: {x: 6, y: 0, z: 3}

timeline:

  # ═══════════════════════════════════════════════════════════════════
  # SCENE 1: THE EMPTY STAGE (T0–T400)
  # The lights are off. Something is here. It hasn't moved yet.
  # ═══════════════════════════════════════════════════════════════════

  - type: TIME_OF_DAY
    at: 0
    time: 18000

  - type: WEATHER
    at: 0
    state: clear
    duration_ticks: -1

  # First sound: distant, low. Something is breathing.
  - type: SOUND
    at: 20
    sound_id: "minecraft:ambient.cave"
    category: ambient
    volume: 0.25
    pitch: 0.7

  - type: ACTION_BAR
    at: 30
    audience: broadcast
    message: "<dark_gray>✦   the stage is dark   ✦</dark_gray>"
    duration_ticks: 120

  # Ember drift — sparse arcane motes in the air
  - type: CUE
    at: 60
    cue_id: atmos.ambient.ember_drift

  - type: MESSAGE
    at: 160
    audience: broadcast
    message: "<dark_gray>...</dark_gray>"

  - type: SOUND
    at: 200
    sound_id: "minecraft:ambient.cave"
    category: ambient
    volume: 0.2
    pitch: 0.6

  - type: CUE
    at: 240
    cue_id: atmos.ambient.ember_drift

  - type: MESSAGE
    at: 320
    audience: broadcast
    message: "<dark_gray>...</dark_gray>"

  # ═══════════════════════════════════════════════════════════════════
  # SCENE 2: THE ARRIVAL (T400–T700)
  # A flash. Something wakes. The first words appear.
  # ═══════════════════════════════════════════════════════════════════

  - type: BOSSBAR
    at: 380
    title: "<dark_gray>Scene: The Arrival</dark_gray>"
    color: WHITE
    overlay: PROGRESS
    duration_ticks: 160
    fade_in_ticks: 20
    fade_out_ticks: 30
    audience: broadcast

  # The arrival flash
  - type: CUE
    at: 400
    cue_id: mood.arrival

  # Hold in the darkness one beat after the thunder
  - type: ACTION_BAR
    at: 420
    audience: broadcast
    message: "<white>✦</white>"
    duration_ticks: 60

  # Dawn breaks — sudden, deliberate
  - type: TIME_OF_DAY
    at: 440
    time: 6000

  - type: SOUND
    at: 450
    sound_id: "minecraft:ui.toast.challenge_complete"
    category: master
    volume: 0.5
    pitch: 0.75

  # First title: minimal. Just a symbol.
  - type: TITLE
    at: 460
    audience: broadcast
    title: "<bold><gold>✦</gold></bold>"
    subtitle: "<gray>something wakes</gray>"
    fade_in: 5
    stay: 35
    fade_out: 10

  # The name
  - type: TITLE
    at: 540
    audience: broadcast
    title: "<white><bold>SCAENA</bold></white>"
    subtitle: "<gray>a choreography engine for Minecraft</gray>"
    fade_in: 10
    stay: 55
    fade_out: 15

  - type: SOUND
    at: 545
    sound_id: "minecraft:block.note_block.chime"
    category: master
    volume: 0.6
    pitch: 1.0

  # ═══════════════════════════════════════════════════════════════════
  # SCENE 3: HELLO (T700–T1200)
  # Sprite speaks. Warm light rises around the player.
  # Short sentences. Space between them.
  # ═══════════════════════════════════════════════════════════════════

  - type: BOSSBAR
    at: 690
    title: "<light_purple>Scene: Hello</light_purple>"
    color: PURPLE
    overlay: PROGRESS
    duration_ticks: 240
    fade_in_ticks: 20
    fade_out_ticks: 30
    audience: broadcast

  - type: CUE
    at: 700
    cue_id: atmos.lights.warm_bloom

  - type: MESSAGE
    at: 740
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <white>Hello.</white>"

  - type: SOUND
    at: 750
    sound_id: "minecraft:block.note_block.chime"
    category: master
    volume: 0.5
    pitch: 1.2

  - type: MESSAGE
    at: 840
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>I am ScaenaSprite — a show director embedded in this world.</gray>"

  - type: MESSAGE
    at: 960
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>I stage moments. I choreograph light, sound, and movement.</gray>"

  - type: TITLE
    at: 1000
    audience: broadcast
    title: "<light_purple>ScaenaSprite</light_purple>"
    subtitle: "<gray>your director is awake</gray>"
    fade_in: 8
    stay: 40
    fade_out: 10

  - type: CUE
    at: 1060
    cue_id: atmos.lights.warm_bloom

  - type: MESSAGE
    at: 1100
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Everything you're experiencing right now — I wrote it.</gray>"

  - type: SOUND
    at: 1140
    sound_id: "minecraft:entity.experience_orb.pickup"
    category: master
    volume: 0.4
    pitch: 1.5

  # ═══════════════════════════════════════════════════════════════════
  # SCENE 4: THE ARCHITECTURE (T1200–T1800)
  # The curtain pulls back. Sprite shows the mechanism behind the show.
  # Meta-theatrical: the ACTION_BAR shows raw event syntax live.
  # ═══════════════════════════════════════════════════════════════════

  - type: BOSSBAR
    at: 1190
    title: "<yellow>Scene: The Architecture</yellow>"
    color: YELLOW
    overlay: PROGRESS
    duration_ticks: 260
    fade_in_ticks: 20
    fade_out_ticks: 30
    audience: broadcast

  - type: MESSAGE
    at: 1200
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <yellow>Let me pull back the curtain.</yellow>"

  - type: MESSAGE
    at: 1280
    audience: broadcast
    message: "<gray>  I am defined by YAML files called <white>Cues</white>.</gray>"

  - type: ACTION_BAR
    at: 1300
    audience: broadcast
    message: "<dark_gray>  type: MESSAGE  ·  at: 1300  ·  audience: broadcast</dark_gray>"
    duration_ticks: 60

  - type: SOUND
    at: 1302
    sound_id: "minecraft:block.note_block.pling"
    category: master
    volume: 0.3
    pitch: 2.0

  - type: MESSAGE
    at: 1360
    audience: broadcast
    message: "<gray>  A Cue has a timeline. Events fire at precise ticks. <white>20 ticks = 1 second.</white></gray>"

  - type: ACTION_BAR
    at: 1380
    audience: broadcast
    message: "<dark_gray>  type: SOUND  ·  at: 1380  ·  sound: chime</dark_gray>"
    duration_ticks: 60

  - type: SOUND
    at: 1382
    sound_id: "minecraft:block.note_block.chime"
    category: master
    volume: 0.5
    pitch: 1.5

  - type: MESSAGE
    at: 1440
    audience: broadcast
    message: "<gray>  Cues can contain other Cues. Shows are Cues with extra properties.</gray>"

  - type: ACTION_BAR
    at: 1480
    audience: broadcast
    message: "<dark_gray>  you are 74 seconds into a Cue called intro.scaena_sprite</dark_gray>"
    duration_ticks: 80

  - type: MESSAGE
    at: 1540
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>That firework you're about to see? A preset named <white>scae_large_fanfare</white>.</gray>"

  # The wonder single — one majestic burst fired from the engine live
  - type: CUE
    at: 1590
    cue_id: mood.wonder.single

  - type: MESSAGE
    at: 1640
    audience: broadcast
    message: "<gray>  Called from a Cue. Referenced by ID. Never hardcoded.</gray>"

  - type: MESSAGE
    at: 1720
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <yellow>Every effect is composable. Every Cue is reusable.</yellow>"

  # ═══════════════════════════════════════════════════════════════════
  # SCENE 5: YOUR STAGE — MOVEMENT (T1800–T2500)
  # Sprite walks the player across the stage marks, narrating as they go.
  # Path: center → west → east → upstage → home
  # Each cross is wide enough to feel real (10 blocks, 80–120 ticks).
  # ═══════════════════════════════════════════════════════════════════

  - type: BOSSBAR
    at: 1790
    title: "<green>Scene: Your Stage</green>"
    color: GREEN
    overlay: PROGRESS
    duration_ticks: 280
    fade_in_ticks: 20
    fade_out_ticks: 30
    audience: broadcast

  - type: MESSAGE
    at: 1800
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <white>This space belongs to you.</white>"

  - type: MESSAGE
    at: 1880
    audience: broadcast
    message: "<gray>  I can move you through it. Safely. Deliberately. As part of the show.</gray>"

  - type: ACTION_BAR
    at: 1920
    audience: broadcast
    message: "<gray>  → turning to face west...</gray>"
    duration_ticks: 30

  # Face west before walking
  - type: FACE
    at: 1920
    target: participants
    look_at: compass:west

  - type: ACTION_BAR
    at: 1940
    audience: broadcast
    message: "<gray>  → crossing to west mark  (10 blocks, 4 seconds)</gray>"
    duration_ticks: 80

  # Walk west — 10 blocks over 80 ticks (~4s)
  - type: CROSS_TO
    at: 1940
    target: participants
    destination: mark:west
    duration_ticks: 80
    facing: compass:west

  # Arrived at west — pause and narrate
  - type: MESSAGE
    at: 2040
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>West mark. 10 blocks from where you started.</gray>"

  - type: FACE
    at: 2040
    target: participants
    look_at: mark:center

  - type: ACTION_BAR
    at: 2080
    audience: broadcast
    message: "<gray>  → crossing the full stage to east mark  (20 blocks, 6 seconds)</gray>"
    duration_ticks: 120

  # Walk east across the full stage — 20 blocks over 120 ticks (~6s)
  - type: CROSS_TO
    at: 2080
    target: participants
    destination: mark:east
    duration_ticks: 120
    facing: compass:east

  # Arrived at east
  - type: MESSAGE
    at: 2220
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>East mark. The full width. You felt every block.</gray>"

  - type: FACE
    at: 2220
    target: participants
    look_at: mark:center

  - type: SOUND
    at: 2240
    sound_id: "minecraft:block.note_block.chime"
    category: master
    volume: 0.4
    pitch: 0.9

  - type: ACTION_BAR
    at: 2280
    audience: broadcast
    message: "<gray>  → heading upstage  (10 blocks north, 4 seconds)</gray>"
    duration_ticks: 80

  # Walk upstage (north) — 10 blocks over 80 ticks
  - type: CROSS_TO
    at: 2280
    target: participants
    destination: mark:upstage
    duration_ticks: 80
    facing: compass:north

  - type: MESSAGE
    at: 2380
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Upstage. Your back is to the audience. The whole stage is in front of you.</gray>"

  - type: FACE
    at: 2400
    target: participants
    look_at: mark:downstage

  - type: ACTION_BAR
    at: 2440
    audience: broadcast
    message: "<gray>  → returning home...</gray>"
    duration_ticks: 80

  # Return home — back to where they started
  - type: RETURN_HOME
    at: 2440
    target: participants
    duration_ticks: 80

  - type: MESSAGE
    at: 2540
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Home. Every show knows where you began.</gray>"

  # ═══════════════════════════════════════════════════════════════════
  # SCENE 6: THE MOODS (T2500–T3000)
  # Three emotional registers: wonder → melancholy → joy.
  # World state changes with each shift. No transitions are instant.
  # ═══════════════════════════════════════════════════════════════════

  - type: BOSSBAR
    at: 2560
    title: "<aqua>Scene: The Moods</aqua>"
    color: BLUE
    overlay: PROGRESS
    duration_ticks: 240
    fade_in_ticks: 20
    fade_out_ticks: 30
    audience: broadcast

  - type: MESSAGE
    at: 2580
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <white>Mood is the language of theatre.</white>"

  - type: MESSAGE
    at: 2640
    audience: broadcast
    message: "<gray>  A show sets a tone. Then shifts it. Every shift is deliberate.</gray>"

  # — MOOD 1: WONDER —

  - type: MESSAGE
    at: 2700
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <aqua>Wonder.</aqua>"

  - type: TIME_OF_DAY
    at: 2710
    time: 18000

  - type: CUE
    at: 2720
    cue_id: mood.wonder.single

  - type: TITLE
    at: 2740
    audience: broadcast
    title: "<aqua>✦</aqua>"
    subtitle: "<gray>the world holds its breath</gray>"
    fade_in: 5
    stay: 50
    fade_out: 15

  - type: ACTION_BAR
    at: 2760
    audience: broadcast
    message: "<aqua>  wonder</aqua>"
    duration_ticks: 80

  - type: CUE
    at: 2760
    cue_id: atmos.lights.cool_bloom

  # — MOOD 2: MELANCHOLY —

  - type: MESSAGE
    at: 2820
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <dark_aqua>Melancholy.</dark_aqua>"

  - type: TIME_OF_DAY
    at: 2830
    time: 13000

  - type: WEATHER
    at: 2830
    state: rain
    duration_ticks: 220

  - type: SOUND
    at: 2840
    sound_id: "minecraft:ambient.cave"
    category: ambient
    volume: 0.4
    pitch: 0.55

  - type: TITLE
    at: 2860
    audience: broadcast
    title: "<dark_aqua>·</dark_aqua>"
    subtitle: "<gray>even theatres have quiet moments</gray>"
    fade_in: 10
    stay: 50
    fade_out: 15

  - type: ACTION_BAR
    at: 2870
    audience: broadcast
    message: "<dark_aqua>  melancholy</dark_aqua>"
    duration_ticks: 80

  # — MOOD 3: JOY —

  - type: MESSAGE
    at: 2940
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <yellow>Joy.</yellow>"

  - type: WEATHER
    at: 2950
    state: clear
    duration_ticks: -1

  - type: TIME_OF_DAY
    at: 2955
    time: 6000

  - type: CUE
    at: 2960
    cue_id: fx.confetti_burst

  - type: TITLE
    at: 2980
    audience: broadcast
    title: "<yellow>✦</yellow>"
    subtitle: "<yellow>and then, the light</yellow>"
    fade_in: 5
    stay: 45
    fade_out: 10

  - type: ACTION_BAR
    at: 2985
    audience: broadcast
    message: "<yellow>  joy</yellow>"
    duration_ticks: 80

  # ═══════════════════════════════════════════════════════════════════
  # SCENE 7: THE INVITATION (T3000–T3300)
  # Sprite hands the stage back. This is now yours.
  # ═══════════════════════════════════════════════════════════════════

  - type: BOSSBAR
    at: 2990
    title: "<gold>Scene: The Invitation</gold>"
    color: YELLOW
    overlay: PROGRESS
    duration_ticks: 180
    fade_in_ticks: 20
    fade_out_ticks: 30
    audience: broadcast

  - type: MESSAGE
    at: 3000
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <white>You've seen what I can do.</white>"

  - type: CUE
    at: 3060
    cue_id: atmos.lights.warm_bloom

  - type: MESSAGE
    at: 3080
    audience: broadcast
    message: "<gray>  Now imagine what <white>you</white> could build with these tools.</gray>"

  - type: MESSAGE
    at: 3160
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Every Cue you've seen tonight is in the library.</gray>"

  - type: MESSAGE
    at: 3220
    audience: broadcast
    message: "<gray>  Composable. Reusable. Yours to build on.</gray>"

  - type: MESSAGE
    at: 3260
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <yellow>Write a show. Give it a stage.</yellow>"

  - type: TITLE
    at: 3280
    audience: broadcast
    title: "<gold>The Stage Is Yours</gold>"
    subtitle: "<gray>write something worth performing</gray>"
    fade_in: 10
    stay: 55
    fade_out: 20

  # ═══════════════════════════════════════════════════════════════════
  # SCENE 8: FINALE (T3300–T3600)
  # Grand firework send-off. Arrival flash reprised. Warm and cool together.
  # ═══════════════════════════════════════════════════════════════════

  - type: BOSSBAR
    at: 3295
    title: "<gold>★  Finale  ★</gold>"
    color: YELLOW
    overlay: PROGRESS
    duration_ticks: 290
    fade_in_ticks: 10
    fade_out_ticks: 60
    audience: broadcast

  # One last arrival flash — bookends the show's opening
  - type: CUE
    at: 3320
    cue_id: mood.arrival

  - type: TIME_OF_DAY
    at: 3340
    time: 6000

  - type: SOUND
    at: 3360
    sound_id: "minecraft:ui.toast.challenge_complete"
    category: master
    volume: 0.7
    pitch: 0.85

  # Warm and cool blooms together — the full palette
  - type: CUE
    at: 3380
    cue_id: atmos.lights.warm_bloom

  - type: CUE
    at: 3390
    cue_id: atmos.lights.cool_bloom

  # Grand scatter
  - type: FIREWORK_RANDOM
    at: 3420
    preset: scae_large_fanfare
    origin_offset: {x: 0, z: 0}
    radius: 14
    count: 5
    y_mode: surface
    y_offset: 3

  - type: FIREWORK_RANDOM
    at: 3440
    preset: pride_burst_rainbow
    origin_offset: {x: 0, z: 0}
    radius: 16
    count: 8
    y_mode: surface
    y_offset: 4

  - type: SOUND
    at: 3445
    sound_id: "minecraft:ui.toast.challenge_complete"
    category: master
    volume: 1.0
    pitch: 1.0

  # Closing title
  - type: TITLE
    at: 3460
    audience: broadcast
    title: "<gold><bold>✦  SCAENA SHOWS  ✦</bold></gold>"
    subtitle: "<gray>a stage in every world</gray>"
    fade_in: 8
    stay: 70
    fade_out: 25

  - type: MESSAGE
    at: 3550
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Until next time. The curtain falls.</gray>"

  - type: ACTION_BAR
    at: 3570
    audience: broadcast
    message: "<dark_gray>  ✦  end of intro  ✦</dark_gray>"
    duration_ticks: 60

  - type: MESSAGE
    at: 3595
    audience: broadcast
    message: "<dark_gray>  — intro.scaena_sprite · 3600 ticks · 3 minutes —</dark_gray>"
