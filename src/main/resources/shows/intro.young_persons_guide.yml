# ScaenaShows v2 — Show: intro.young_persons_guide
# ─────────────────────────────────────────────────────────────────────
# A YOUNG PERSON'S GUIDE TO THE SCAENA THEATRE
# Inspired by Bernstein's Young Person's Guide to the Orchestra.
#
# Structure:
#   Overture:  The theme is played in full — all capabilities at once.
#   Chapters:  Each capability family is introduced and demonstrated alone.
#   Synthesis: Each chapter re-enters, one by one, building like a fugue.
#   Finale:    The theme reprised in full — now the player understands every part.
#
# Six Chapters:
#   1 — The Voice      (MESSAGE, TITLE, ACTION_BAR)
#   2 — The Music      (SOUND — pitch, volume, layering)
#   3 — The Light      (FIREWORK, FIREWORK_CIRCLE, FIREWORK_LINE, FIREWORK_FAN, FIREWORK_RANDOM)
#   4 — The Atmosphere (PARTICLE, EFFECT, GLOW, LIGHTNING)
#   5 — The Stage      (FACE, CROSS_TO, RETURN_HOME)
#   6 — The World      (TIME_OF_DAY, WEATHER)
#
# Runtime: ~9000 ticks (~7.5 minutes)
#
# Chapter timeline (ticks → seconds):
#   T0–1000   ( 0– 50s)  OVERTURE        — arrival, theme teaser, "now I'll take it apart"
#   T1000–2000(50–100s)  CHAPTER 1       — The Voice
#   T2000–3000(100–150s) CHAPTER 2       — The Music
#   T3000–4600(150–230s) CHAPTER 3       — The Light (longer; 5 patterns to demonstrate)
#   T4600–5400(230–270s) CHAPTER 4       — The Atmosphere
#   T5400–6400(270–320s) CHAPTER 5       — The Stage (movement)
#   T6400–7200(320–360s) CHAPTER 6       — The World
#   T7200–8400(360–420s) THE FUGUE       — all chapters re-enter one by one
#   T8400–9000(420–450s) FINALE          — theme reprised; the stage is yours
# ─────────────────────────────────────────────────────────────────────

id: intro.young_persons_guide
name: "A Young Person's Guide to the Scaena Theatre"
description: "ScaenaSprite introduces every dimension of the Scaena engine — one chapter at a time — then brings them all together. Inspired by Bernstein. ~7.5 minutes."
duration_ticks: 9000

portable: false
default_mode: static
default_audience: broadcast
group_count: 1
group_strategy: join_order
front: south

# SETUP: Stand at the base of a tall environmental object (a tree, tower, pillar —
# anything vertical at the center of an open space). Run /show play from there.
# The anchor locks to that point; all effects fire relative to it.
# You will be moved around the object as an audience member while fireworks
# fire at the fixed center throughout. face the object to appreciate the full effect.

bossbar:
  enabled: true
  title: "<dark_gray>A Young Person's Guide to the Scaena Theatre</dark_gray>"
  color: WHITE
  overlay: PROGRESS
  fade_in_ticks: 60
  fade_out_ticks: 80
  audience: broadcast

marks:
  # The landmark itself — fireworks fire here
  center:
    offset: {x: 0, y: 0, z: 0}
  # Viewer positions ringing the landmark at 12 blocks
  south_view:
    offset: {x: 0, y: 0, z: 12}
  east_view:
    offset: {x: 12, y: 0, z: 0}
  north_view:
    offset: {x: 0, y: 0, z: -12}
  west_view:
    offset: {x: -12, y: 0, z: 0}
  # Close-up and wide positions
  close_view:
    offset: {x: 0, y: 0, z: 4}
  wide_south:
    offset: {x: 0, y: 0, z: 20}

timeline:

  # ═══════════════════════════════════════════════════════════════════
  # OVERTURE (T0–T1000)
  # The stage is dark. Something wakes.
  # The theme plays in full — every capability, all at once.
  # "Now I'll take it apart."
  # ═══════════════════════════════════════════════════════════════════

  - type: TIME_OF_DAY
    at: 0
    time: 18000

  - type: WEATHER
    at: 0
    state: clear
    duration_ticks: -1

  - type: CUE
    at: 30
    cue_id: atmos.ambient.ember_drift

  - type: SOUND
    at: 40
    sound_id: "minecraft:ambient.cave"
    category: ambient
    volume: 0.2
    pitch: 0.65

  - type: ACTION_BAR
    at: 50
    audience: broadcast
    message: "<dark_gray>✦   the stage is dark   ✦</dark_gray>"
    duration_ticks: 100

  # The arrival — something wakes
  - type: CUE
    at: 200
    cue_id: mood.arrival

  - type: TIME_OF_DAY
    at: 220
    time: 6000

  - type: TITLE
    at: 260
    audience: broadcast
    title: "<white><bold>A Young Person's Guide</bold></white>"
    subtitle: "<gray>to the Scaena Theatre</gray>"
    fade_in: 10
    stay: 60
    fade_out: 15

  - type: SOUND
    at: 265
    sound_id: "minecraft:block.note_block.chime"
    category: master
    volume: 0.6
    pitch: 1.0

  - type: MESSAGE
    at: 380
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <white>Welcome.</white>"

  - type: MESSAGE
    at: 440
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>You are standing in a Scaena theatre — a performance space built inside Minecraft.</gray>"

  - type: MESSAGE
    at: 560
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Before I explain how it works — let me show you what it can do.</gray>"

  - type: BOSSBAR
    at: 630
    title: "<white>Overture: The Theme</white>"
    color: WHITE
    overlay: PROGRESS
    duration_ticks: 260
    fade_in_ticks: 20
    fade_out_ticks: 30
    audience: broadcast

  - type: MESSAGE
    at: 650
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <yellow>The theme — everything at once.</yellow>"

  - type: SOUND
    at: 680
    sound_id: "minecraft:entity.experience_orb.pickup"
    category: master
    volume: 0.5
    pitch: 0.8

  # THEME TEASER — 600 ticks (30 seconds), all capabilities compressed
  - type: CUE
    at: 700
    cue_id: overture.theme_teaser

  # Theme ends ~T1300. Transition narration.
  - type: MESSAGE
    at: 1340
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>That was everything. Every dimension of this stage.</gray>"

  - type: MESSAGE
    at: 1420
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Now I'll take it apart. One family at a time.</gray>"

  - type: MESSAGE
    at: 1500
    audience: broadcast
    message: "<gray>  Six chapters. Each one stands alone.</gray>"

  - type: ACTION_BAR
    at: 1560
    audience: broadcast
    message: "<gray>  Chapter 1 begins shortly...</gray>"
    duration_ticks: 80

  - type: SOUND
    at: 1620
    sound_id: "minecraft:block.note_block.pling"
    category: master
    volume: 0.4
    pitch: 1.8

  # ═══════════════════════════════════════════════════════════════════
  # CHAPTER 1: THE VOICE (T1700–T2600)
  # MESSAGE · TITLE · ACTION_BAR
  # A show speaks first. Three registers, one voice.
  # ═══════════════════════════════════════════════════════════════════

  - type: BOSSBAR
    at: 1690
    title: "<white>Chapter 1 — The Voice</white>"
    color: WHITE
    overlay: PROGRESS
    duration_ticks: 380
    fade_in_ticks: 20
    fade_out_ticks: 30
    audience: broadcast

  - type: TITLE
    at: 1700
    audience: broadcast
    title: "<white>Chapter 1</white>"
    subtitle: "<gray>The Voice</gray>"
    fade_in: 8
    stay: 40
    fade_out: 10

  - type: SOUND
    at: 1702
    sound_id: "minecraft:block.note_block.harp"
    category: master
    volume: 0.5
    pitch: 1.0

  - type: MESSAGE
    at: 1780
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <white>A show speaks first. Before the lights. Before the sound.</white>"

  - type: MESSAGE
    at: 1860
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Three registers. I'll demonstrate each one.</gray>"

  # Register 1: MESSAGE
  - type: ACTION_BAR
    at: 1940
    audience: broadcast
    message: "<gray>  ① the message —</gray>"
    duration_ticks: 40

  - type: MESSAGE
    at: 1960
    audience: broadcast
    message: "<yellow>  → This is a MESSAGE. It appears here, in chat.</yellow>"

  - type: MESSAGE
    at: 2000
    audience: broadcast
    message: "<gray>     Messages can be any color. Any weight.</gray> <dark_gray>Even quiet.</dark_gray>"

  - type: MESSAGE
    at: 2040
    audience: broadcast
    message: "<red><bold>     Or urgent.</bold></red>"

  # Register 2: TITLE
  - type: ACTION_BAR
    at: 2100
    audience: broadcast
    message: "<gray>  ② the title —</gray>"
    duration_ticks: 40

  - type: TITLE
    at: 2120
    audience: broadcast
    title: "<white><bold>THE TITLE</bold></white>"
    subtitle: "<gray>full-screen · impossible to miss</gray>"
    fade_in: 5
    stay: 35
    fade_out: 8

  - type: SOUND
    at: 2122
    sound_id: "minecraft:block.note_block.harp"
    category: master
    volume: 0.4
    pitch: 1.3

  - type: MESSAGE
    at: 2200
    audience: broadcast
    message: "<gray>     Titles are the theatre's biggest voice. Use them for the moments that matter.</gray>"

  # Register 3: ACTION_BAR
  - type: MESSAGE
    at: 2260
    audience: broadcast
    message: "<gray>  ③ the action bar —</gray>"

  - type: ACTION_BAR
    at: 2280
    audience: broadcast
    message: "<white>  ← this is the action bar. quiet. persistent. always visible.</white>"
    duration_ticks: 120

  - type: MESSAGE
    at: 2320
    audience: broadcast
    message: "<gray>     The action bar whispers while everything else shouts.</gray>"

  # All three together
  - type: MESSAGE
    at: 2400
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <yellow>Now — all three at once.</yellow>"

  - type: MESSAGE
    at: 2440
    audience: broadcast
    message: "<aqua>  ✦ chat message ✦</aqua>"

  - type: TITLE
    at: 2440
    audience: broadcast
    title: "<gold>✦ title ✦</gold>"
    subtitle: "<gray>all three registers, one moment</gray>"
    fade_in: 4
    stay: 30
    fade_out: 8

  - type: ACTION_BAR
    at: 2440
    audience: broadcast
    message: "<light_purple>  ✦ action bar ✦</light_purple>"
    duration_ticks: 60

  - type: SOUND
    at: 2442
    sound_id: "minecraft:entity.experience_orb.pickup"
    category: master
    volume: 0.6
    pitch: 1.4

  - type: MESSAGE
    at: 2540
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>The voice can layer. Three simultaneous channels. You choose the register.</gray>"

  # ═══════════════════════════════════════════════════════════════════
  # CHAPTER 2: THE MUSIC (T2700–T3600)
  # SOUND — pitch, volume, layering, signature
  # ═══════════════════════════════════════════════════════════════════

  - type: BOSSBAR
    at: 2690
    title: "<aqua>Chapter 2 — The Music</aqua>"
    color: BLUE
    overlay: PROGRESS
    duration_ticks: 380
    fade_in_ticks: 20
    fade_out_ticks: 30
    audience: broadcast

  - type: TITLE
    at: 2700
    audience: broadcast
    title: "<aqua>Chapter 2</aqua>"
    subtitle: "<gray>The Music</gray>"
    fade_in: 8
    stay: 40
    fade_out: 10

  - type: SOUND
    at: 2702
    sound_id: "minecraft:block.note_block.harp"
    category: master
    volume: 0.6
    pitch: 1.0

  - type: MESSAGE
    at: 2780
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <white>Now, sound.</white>"

  - type: MESSAGE
    at: 2840
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>The same note. Three pitches.</gray>"

  - type: ACTION_BAR
    at: 2880
    audience: broadcast
    message: "<gray>  listen...</gray>"
    duration_ticks: 30

  # Pitch demonstration — same sound, different pitches
  - type: SOUND
    at: 2900
    sound_id: "minecraft:block.note_block.harp"
    category: master
    volume: 0.7
    pitch: 0.6

  - type: MESSAGE
    at: 2905
    audience: broadcast
    message: "<gray>  → pitch 0.6 — low</gray>"

  - type: SOUND
    at: 2960
    sound_id: "minecraft:block.note_block.harp"
    category: master
    volume: 0.7
    pitch: 1.0

  - type: MESSAGE
    at: 2965
    audience: broadcast
    message: "<gray>  → pitch 1.0 — middle</gray>"

  - type: SOUND
    at: 3020
    sound_id: "minecraft:block.note_block.harp"
    category: master
    volume: 0.7
    pitch: 2.0

  - type: MESSAGE
    at: 3025
    audience: broadcast
    message: "<gray>  → pitch 2.0 — high</gray>"

  - type: MESSAGE
    at: 3100
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Different sounds carry different weight.</gray>"

  - type: ACTION_BAR
    at: 3120
    audience: broadcast
    message: "<gray>  three sounds — three textures...</gray>"
    duration_ticks: 60

  - type: SOUND
    at: 3140
    sound_id: "minecraft:block.note_block.chime"
    category: master
    volume: 0.6
    pitch: 1.5

  - type: MESSAGE
    at: 3145
    audience: broadcast
    message: "<gray>  → chime: bright, crystalline</gray>"

  - type: SOUND
    at: 3200
    sound_id: "minecraft:entity.experience_orb.pickup"
    category: master
    volume: 0.6
    pitch: 0.9

  - type: MESSAGE
    at: 3205
    audience: broadcast
    message: "<gray>  → orb pickup: warm, ascending</gray>"

  - type: SOUND
    at: 3260
    sound_id: "minecraft:entity.ender_dragon.growl"
    category: master
    volume: 0.2
    pitch: 1.8

  - type: MESSAGE
    at: 3265
    audience: broadcast
    message: "<gray>  → dragon growl at low volume, high pitch: tense, theatrical</gray>"

  - type: MESSAGE
    at: 3360
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>And they layer.</gray>"

  # Three sounds simultaneously
  - type: SOUND
    at: 3400
    sound_id: "minecraft:block.note_block.chime"
    category: master
    volume: 0.5
    pitch: 1.3

  - type: SOUND
    at: 3400
    sound_id: "minecraft:entity.experience_orb.pickup"
    category: master
    volume: 0.5
    pitch: 1.0

  - type: SOUND
    at: 3410
    sound_id: "minecraft:ui.toast.challenge_complete"
    category: master
    volume: 0.6
    pitch: 1.1

  - type: MESSAGE
    at: 3420
    audience: broadcast
    message: "<gray>  → three simultaneous sounds — a chord</gray>"

  - type: MESSAGE
    at: 3500
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>A show scores itself. Every moment can have a sonic signature.</gray>"

  - type: SOUND
    at: 3560
    sound_id: "minecraft:ui.toast.challenge_complete"
    category: master
    volume: 0.5
    pitch: 0.8

  - type: ACTION_BAR
    at: 3575
    audience: broadcast
    message: "<dark_gray>  ...sound doesn't need light to land</dark_gray>"
    duration_ticks: 80

  # ═══════════════════════════════════════════════════════════════════
  # CHAPTER 3: THE LIGHT (T3700–T5400)
  # Five firework patterns demonstrated individually, then combined
  # ═══════════════════════════════════════════════════════════════════

  - type: BOSSBAR
    at: 3690
    title: "<gold>Chapter 3 — The Light</gold>"
    color: GOLD
    overlay: PROGRESS
    duration_ticks: 700
    fade_in_ticks: 20
    fade_out_ticks: 40
    audience: broadcast

  - type: TITLE
    at: 3700
    audience: broadcast
    title: "<gold>Chapter 3</gold>"
    subtitle: "<gray>The Light</gray>"
    fade_in: 8
    stay: 40
    fade_out: 10

  - type: SOUND
    at: 3702
    sound_id: "minecraft:block.note_block.harp"
    category: master
    volume: 0.5
    pitch: 1.0

  - type: MESSAGE
    at: 3780
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <white>The fireworks are our brushstrokes.</white>"

  - type: MESSAGE
    at: 3840
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Five patterns. I'll show each one in isolation, then combine them.</gray>"

  # — Pattern 1: FIREWORK (single) —
  - type: ACTION_BAR
    at: 3920
    audience: broadcast
    message: "<gold>  Pattern 1 of 5 — Single</gold>"
    duration_ticks: 60

  - type: MESSAGE
    at: 3940
    audience: broadcast
    message: "<gray>  → <white>FIREWORK</white>: a single rocket. One preset, one position, one moment.</gray>"

  - type: FIREWORK
    at: 3960
    preset: scae_large_fanfare
    offset: {x: 0, y: 18, z: 0}
    y_mode: relative

  - type: SOUND
    at: 3962
    sound_id: "minecraft:entity.experience_orb.pickup"
    category: master
    volume: 0.5
    pitch: 0.9

  - type: MESSAGE
    at: 4020
    audience: broadcast
    message: "<gray>     Power, color, shape — all defined by the preset.</gray>"

  # — Pattern 2: FIREWORK_CIRCLE —
  - type: ACTION_BAR
    at: 4080
    audience: broadcast
    message: "<gold>  Pattern 2 of 5 — Circle</gold>"
    duration_ticks: 60

  - type: MESSAGE
    at: 4100
    audience: broadcast
    message: "<gray>  → <white>FIREWORK_CIRCLE</white>: equally-spaced rockets around a radius. Chase optional.</gray>"

  - type: FIREWORK_CIRCLE
    at: 4120
    preset: scae_star_warm
    origin_offset: {x: 0, z: 0}
    radius: 9
    count: 8
    chase: {enabled: true, direction: FL, interval_ticks: 4}
    power_variation: UNIFORM
    color_variation: UNIFORM

  - type: MESSAGE
    at: 4200
    audience: broadcast
    message: "<gray>     With chase enabled — each rocket fires 4 ticks after the last.</gray>"

  # — Pattern 3: FIREWORK_LINE —
  - type: ACTION_BAR
    at: 4280
    audience: broadcast
    message: "<gold>  Pattern 3 of 5 — Line</gold>"
    duration_ticks: 60

  - type: MESSAGE
    at: 4300
    audience: broadcast
    message: "<gray>  → <white>FIREWORK_LINE</white>: a sequence of rockets along a bearing angle.</gray>"

  - type: FIREWORK_LINE
    at: 4320
    preset: scae_burst_leaf
    start_offset: {x: -9, z: 0}
    length: 18
    angle: 90
    count: 7
    y_mode: surface
    y_offset: 2
    chase: {enabled: true, direction: FL, interval_ticks: 5}
    power_variation: RAMP_UP

  - type: MESSAGE
    at: 4420
    audience: broadcast
    message: "<gray>     angle: 90° = due east. Bearing is clockwise from north.</gray>"

  # — Pattern 4: FIREWORK_FAN —
  - type: ACTION_BAR
    at: 4480
    audience: broadcast
    message: "<gold>  Pattern 4 of 5 — Fan</gold>"
    duration_ticks: 60

  - type: MESSAGE
    at: 4500
    audience: broadcast
    message: "<gray>  → <white>FIREWORK_FAN</white>: multiple arms radiating from a point. Define each arm independently.</gray>"

  - type: FIREWORK_FAN
    at: 4520
    origin_offset: {x: 0, z: 0}
    arms:
      - {angle: 300, length: 11, count: 4, preset: scae_ball_spark}
      - {angle: 0,   length: 14, count: 5, preset: scae_large_fanfare}
      - {angle: 60,  length: 11, count: 4, preset: scae_ball_spark}
    y_mode: surface
    y_offset: 2
    chase: {enabled: true, direction: FL, interval_ticks: 5}

  - type: MESSAGE
    at: 4640
    audience: broadcast
    message: "<gray>     Each arm has its own angle, length, count, and preset.</gray>"

  # — Pattern 5: FIREWORK_RANDOM —
  - type: ACTION_BAR
    at: 4700
    audience: broadcast
    message: "<gold>  Pattern 5 of 5 — Scatter</gold>"
    duration_ticks: 60

  - type: MESSAGE
    at: 4720
    audience: broadcast
    message: "<gray>  → <white>FIREWORK_RANDOM</white>: N rockets at random positions within a radius. Scale is everything.</gray>"

  - type: MESSAGE
    at: 4760
    audience: broadcast
    message: "<gray>  → <white>Tight</white>: radius 3 — a dense cluster right at center.</gray>"

  - type: FIREWORK_RANDOM
    at: 4780
    preset: scae_burst_leaf
    origin_offset: {x: 0, z: 0}
    radius: 3
    count: 8
    y_mode: surface
    y_offset: 2

  - type: SOUND
    at: 4782
    sound_id: "minecraft:entity.experience_orb.pickup"
    category: master
    volume: 0.5
    pitch: 1.1

  - type: MESSAGE
    at: 4860
    audience: broadcast
    message: "<gray>  → <white>Wide</white>: same count, radius 18 — spread across the whole space.</gray>"

  - type: FIREWORK_RANDOM
    at: 4880
    preset: scae_burst_leaf
    origin_offset: {x: 0, z: 0}
    radius: 18
    count: 8
    y_mode: surface
    y_offset: 3

  - type: SOUND
    at: 4882
    sound_id: "minecraft:entity.experience_orb.pickup"
    category: master
    volume: 0.5
    pitch: 0.8

  - type: MESSAGE
    at: 4960
    audience: broadcast
    message: "<gray>     Same preset. Same count. The radius is the entire performance.</gray>"

  # — Combinations —
  - type: MESSAGE
    at: 4940
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <yellow>Now watch what happens when patterns combine.</yellow>"

  - type: FIREWORK_CIRCLE
    at: 4980
    preset: scae_star_warm
    origin_offset: {x: 0, z: 0}
    radius: 7
    count: 6
    power_variation: UNIFORM

  - type: FIREWORK_RANDOM
    at: 4990
    preset: pride_burst_rainbow
    origin_offset: {x: 0, z: 0}
    radius: 14
    count: 6
    y_mode: surface
    y_offset: 3

  - type: FIREWORK_LINE
    at: 5060
    preset: scae_ball_spark
    start_offset: {x: 0, z: -8}
    length: 16
    angle: 180
    count: 6
    y_mode: surface
    y_offset: 2

  - type: FIREWORK_FAN
    at: 5070
    origin_offset: {x: 0, z: 0}
    arms:
      - {angle: 270, length: 10, count: 4, preset: bday_confetti_ball}
      - {angle: 90,  length: 10, count: 4, preset: bday_confetti_ball}
    y_mode: surface
    y_offset: 2

  - type: SOUND
    at: 5075
    sound_id: "minecraft:entity.player.levelup"
    category: master
    volume: 0.6
    pitch: 1.0

  - type: MESSAGE
    at: 5160
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Five patterns. That's the full vocabulary of light in Scaena.</gray>"

  # ═══════════════════════════════════════════════════════════════════
  # CHAPTER 4: THE ATMOSPHERE (T5400–T6200)
  # PARTICLE · EFFECT · LIGHTNING
  # The air itself is part of the show.
  # ═══════════════════════════════════════════════════════════════════

  - type: BOSSBAR
    at: 5390
    title: "<light_purple>Chapter 4 — The Atmosphere</light_purple>"
    color: PURPLE
    overlay: PROGRESS
    duration_ticks: 360
