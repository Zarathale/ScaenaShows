# ScaenaShows v2 — Show: demo.archetype_sampler
# ─────────────────────────────────────────────────────────────────────
# ARCHETYPE SAMPLER — REVISION 4  (2026-03-24)
#
# Changes from Revision 3:
#   - Ember Drift (Section 1): extended to 20s; three-voice text counterpoint
#     MESSAGE · ACTION_BAR · TITLE used as distinct dramatic registers
#   - All sections 2–8 and closers shift +200 ticks to accommodate
#   - duration_ticks: 3020 → 3220
#
# Structure:
#   T0–340       HOUSELIGHTS DOWN     — single snap to dusk, clock runs naturally
#   T380–780     Section 1: Ember Drift     (particle-bed · still · breath · three channels)
#   T840–990     Section 2: Warm Light      (fireworks-light · warm · low)
#   T1060–1200   Section 3: Cool Light      (fireworks-light · icy · mysterious)
#   T1280–1450   Section 4: Cave Sound      (sound-driven · melancholic · no visuals)
#   T1480–1580   LAYERED PAUSE              (2 messages · quiet gap before Section 5)
#   T1660–1790   Section 5: Arrival Flash   (explosive · flash · dramatic)
#   T1880–2000   Section 6: Joy Burst       (celebratory · high · flash)
#   T2100–2320   DAYLIGHT BURST             — snap noon · rainbow · snap night
#   T2360–2600   Section 7: Warm Ramp       (building · scene · scatter)
#   T2680–2840   Section 8: Wonder Single   (reverent · overhead · subtle)
#   T2900–2960   LIFT TO HEIGHT             (player floats up, drifts down through close)
#   T3020–3180   HOUSELIGHTS UP             — single snap to horizon glow, clock runs to dawn
#
# Runtime: ~3220 ticks (~2:41)
# ─────────────────────────────────────────────────────────────────────

id: demo.archetype_sampler
name: "Archetype Sampler"
description: "Calibration run v4 — ember drift 20s, three-voice text counterpoint. All sections +200. ~2:41."
duration_ticks: 3220

portable: true
default_mode: static
default_audience: broadcast
group_count: 1
group_strategy: join_order
front: south

bossbar:
  enabled: true
  title: "<dark_gray>archetype sampler  ·  take notes  ·  iterate</dark_gray>"
  color: WHITE
  overlay: PROGRESS
  fade_in_ticks: 20
  fade_out_ticks: 80
  audience: broadcast

timeline:

  # ═══════════════════════════════════════════════════════════════════
  # HOUSELIGHTS DOWN  (T0–T340)
  #
  # ONE TIME_OF_DAY snap — then let the clock run naturally.
  # T=13500: sun just below the horizon, sky purple-orange.
  # The clock advances naturally through the show; stars never jump.
  # ═══════════════════════════════════════════════════════════════════

  # Single snap — sky lands, then runs on its own from here
  - type: TIME_OF_DAY
    at: 0
    time: 13500

  - type: MESSAGE
    at: 20
    audience: broadcast
    message: "<dark_gray>...</dark_gray>"

  - type: MESSAGE
    at: 120
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>The lights are going down.</gray>"

  - type: MESSAGE
    at: 280
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>We begin.</gray>"


  # ═══════════════════════════════════════════════════════════════════
  # SECTION 1: EMBER DRIFT  (T380–T780)
  # Tags: particle-bed · still · breath · subtle · dreamy
  #
  # Text treatment: three-voice counterpoint across 20 seconds.
  #   MESSAGE (chat)       — [Sprite] voice, arrives at intervals, poetic
  #   ACTION_BAR (bottom)  — a quieter second voice; the room itself speaking
  #   TITLE (center)       — single word, arrives late, as a gesture not a statement
  #
  # Compositional structure:
  #   Beat 1 (T380–T480):  Arrival. Single voice. Silence does the rest.
  #   Beat 2 (T480–T560):  ACTION_BAR enters alone — ground voice, 4s hold.
  #   Beat 3 (T560–T660):  Counterpoint. MESSAGE and ACTION_BAR simultaneously.
  #                        The bar arrives 20 ticks after the message, like an echo.
  #   Beat 4 (T660–T750):  TITLE drops — one word, late, as culmination.
  #   Beat 5 (T750–T780):  Closer + section label.
  # ═══════════════════════════════════════════════════════════════════

  # BEAT 1 — Arrival. One voice. Let the particles settle without narration.
  - type: MESSAGE
    at: 380
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Something settles around you.</gray>"

  - type: CUE
    at: 460
    cue_id: atmos.ambient.ember_drift

  # BEAT 2 — ACTION_BAR enters alone. Quiet instruction from the room.
  # 4 seconds of: embers + this line at the bottom. Nothing else.
  - type: ACTION_BAR
    at: 480
    audience: broadcast
    message: "<dark_gray>let it settle.</dark_gray>"
    duration_ticks: 80

  # BEAT 3 — Counterpoint. MESSAGE and ACTION_BAR in the same moment.
  # MESSAGE arrives first; ACTION_BAR follows 20 ticks later (1 second)
  # as if it heard the first line and responded.
  - type: CUE
    at: 560
    cue_id: atmos.ambient.ember_drift

  - type: MESSAGE
    at: 560
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Nothing here is asking for your attention.</gray>"

  - type: ACTION_BAR
    at: 580
    audience: broadcast
    message: "<dark_gray>you noticed anyway.</dark_gray>"
    duration_ticks: 80

  # BEAT 4 — Third particle wave. TITLE arrives late, as the third register.
  # No Sprite text here — the word stands alone.
  - type: CUE
    at: 660
    cue_id: atmos.ambient.ember_drift

  - type: TITLE
    at: 680
    audience: broadcast
    title: ""
    subtitle: "<dark_gray>breathe.</dark_gray>"
    fade_in: 10
    stay: 40
    fade_out: 20

  # BEAT 5 — Closer. Permission to stay.
  - type: MESSAGE
    at: 750
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Stay as long as you need.</gray>"

  - type: MESSAGE
    at: 780
    audience: broadcast
    message: "<dark_gray>  ↳ atmos.ambient.ember_drift  ·  particle-bed  ·  still  ·  three channels</dark_gray>"


  # ═══════════════════════════════════════════════════════════════════
  # SECTION 2: WARM LIGHT WASH  (T840–T990)
  # Tags: fireworks-light · warm · low · subtle
  # ═══════════════════════════════════════════════════════════════════

  - type: MESSAGE
    at: 840
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Warmth at ground level.</gray>"

  - type: CUE
    at: 920
    cue_id: atmos.lights.warm_bloom

  - type: MESSAGE
    at: 990
    audience: broadcast
    message: "<dark_gray>  ↳ atmos.lights.warm_bloom  ·  fireworks-light  ·  warm  ·  low</dark_gray>"


  # ═══════════════════════════════════════════════════════════════════
  # SECTION 3: COOL LIGHT WASH  (T1060–T1200)
  # Tags: fireworks-light · icy · mysterious
  # ═══════════════════════════════════════════════════════════════════

  - type: MESSAGE
    at: 1060
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>The room shifts register.</gray>"

  - type: CUE
    at: 1140
    cue_id: atmos.lights.cool_bloom

  - type: MESSAGE
    at: 1200
    audience: broadcast
    message: "<dark_gray>  ↳ atmos.lights.cool_bloom  ·  fireworks-light  ·  icy  ·  mysterious</dark_gray>"


  # ═══════════════════════════════════════════════════════════════════
  # SECTION 4: CAVE SOUND  (T1280–T1450)
  # Tags: sound-driven · melancholic · no visuals
  # ═══════════════════════════════════════════════════════════════════

  - type: MESSAGE
    at: 1280
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Nothing to see here.</gray>"

  - type: MESSAGE
    at: 1340
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Listen.</gray>"

  - type: CUE
    at: 1380
    cue_id: grief.sound.cave

  - type: MESSAGE
    at: 1450
    audience: broadcast
    message: "<dark_gray>  ↳ grief.sound.cave  ·  sound-driven  ·  melancholic  ·  no visuals</dark_gray>"


  # ═══════════════════════════════════════════════════════════════════
  # LAYERED PAUSE  (T1480–T1580)
  # 80-tick gap of silence follows before Section 5 begins at T1660.
  # ═══════════════════════════════════════════════════════════════════

  - type: MESSAGE
    at: 1480
    audience: broadcast
    message: "<dark_gray>...</dark_gray>"

  - type: MESSAGE
    at: 1580
    audience: broadcast
    message: "<dark_gray>The pause is also a cue.</dark_gray>"


  # ═══════════════════════════════════════════════════════════════════
  # SECTION 5: DRAMATIC ARRIVAL  (T1660–T1790)
  # Tags: explosive · flash · dramatic
  # ═══════════════════════════════════════════════════════════════════

  - type: MESSAGE
    at: 1660
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Something arrives.</gray>"

  - type: CUE
    at: 1720
    cue_id: mood.arrival

  - type: MESSAGE
    at: 1790
    audience: broadcast
    message: "<dark_gray>  ↳ mood.arrival  ·  explosive  ·  flash  ·  dramatic</dark_gray>"


  # ═══════════════════════════════════════════════════════════════════
  # SECTION 6: JOY BURST  (T1880–T2000)
  # Tags: celebratory · high · flash
  # ═══════════════════════════════════════════════════════════════════

  - type: MESSAGE
    at: 1880
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>The other register.</gray>"

  - type: CUE
    at: 1940
    cue_id: fx.confetti_burst

  - type: MESSAGE
    at: 2000
    audience: broadcast
    message: "<dark_gray>  ↳ fx.confetti_burst  ·  celebratory  ·  high  ·  flash</dark_gray>"


  # ═══════════════════════════════════════════════════════════════════
  # DAYLIGHT BURST  (T2100–T2320)
  #
  # Sudden snap to noon. No ramp — the surprise IS the instantness.
  # STOP_SOUND clears background music first so the burst hits clean.
  # Big rainbow fireworks across multiple waves.
  # Then: darkness returns. As if nothing happened.
  # ═══════════════════════════════════════════════════════════════════

  - type: STOP_SOUND
    at: 2100
    source: music

  - type: TIME_OF_DAY
    at: 2100
    time: 6000

  # Opening hit — dramatic threshold sound
  - type: SOUND
    at: 2100
    sound_id: "minecraft:entity.ender_dragon.flap"
    category: master
    volume: 0.9
    pitch: 1.4

  # Wave 1 — large rainbow balls, high overhead
  - type: FIREWORK_RANDOM
    at: 2100
    preset: pride_finale_large
    origin_offset: {x: 0, z: 0}
    radius: 20
    count: 7
    y_mode: surface
    y_offset: 16

  # Boom sound for the launch
  - type: SOUND
    at: 2110
    sound_id: "minecraft:entity.firework_rocket.large_blast"
    category: master
    volume: 1.0
    pitch: 0.85

  # Wave 2 — rainbow burst scatter, mid height
  - type: FIREWORK_RANDOM
    at: 2120
    preset: pride_burst_rainbow
    origin_offset: {x: 0, z: 0}
    radius: 16
    count: 14
    y_mode: surface
    y_offset: 8

  # Wave 3 — birthday large balls, wide spread
  - type: FIREWORK_RANDOM
    at: 2140
    preset: bday_finale_large
    origin_offset: {x: 0, z: 0}
    radius: 20
    count: 8
    y_mode: surface
    y_offset: 12

  # Wave 4 — pride star wave, medium height
  - type: FIREWORK_RANDOM
    at: 2160
    preset: pride_wave_star
    origin_offset: {x: 0, z: 0}
    radius: 18
    count: 10
    y_mode: surface
    y_offset: 10

  # Chime at the peak of the chaos
  - type: SOUND
    at: 2160
    sound_id: "minecraft:block.amethyst_block.chime"
    category: master
    volume: 0.9
    pitch: 0.9

  # Wave 5 — final large burst, highest overhead
  - type: FIREWORK_RANDOM
    at: 2180
    preset: pride_finale_large
    origin_offset: {x: 0, z: 0}
    radius: 24
    count: 6
    y_mode: surface
    y_offset: 18

  # Far boom — resonance as the last wave clears
  - type: SOUND
    at: 2200
    sound_id: "minecraft:entity.firework_rocket.large_blast_far"
    category: master
    volume: 0.8
    pitch: 0.7

  # Snap back — deliberate mirror of the opening snap
  # No Sprite comment during the burst; "Dark again." is the punchline that lands after.
  - type: TIME_OF_DAY
    at: 2260
    time: 18000

  # Cave ambient re-grounds the moment
  - type: SOUND
    at: 2260
    sound_id: "minecraft:ambient.cave"
    category: ambient
    volume: 0.25
    pitch: 0.55

  - type: MESSAGE
    at: 2300
    audience: broadcast
    message: "<dark_gray>Dark again. As if nothing happened.</dark_gray>"

  - type: MESSAGE
    at: 2320
    audience: broadcast
    message: "<dark_gray>  ↳ daylight burst  ·  time snap · STOP_SOUND · rainbow  ·  wry</dark_gray>"


  # ═══════════════════════════════════════════════════════════════════
  # SECTION 7: WARM RAMP  (T2360–T2600)
  # Tags: building · scene · scatter-radial
  # ═══════════════════════════════════════════════════════════════════

  - type: MESSAGE
    at: 2360
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Something building.</gray>"

  - type: CUE
    at: 2420
    cue_id: ramp.pulse.warm

  - type: MESSAGE
    at: 2600
    audience: broadcast
    message: "<dark_gray>  ↳ ramp.pulse.warm  ·  building  ·  scene  ·  4-wave ramp</dark_gray>"


  # ═══════════════════════════════════════════════════════════════════
  # SECTION 8: WONDER SINGLE  (T2680–T2840)
  # Tags: reverent · overhead · subtle
  # ═══════════════════════════════════════════════════════════════════

  - type: MESSAGE
    at: 2680
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Look up.</gray>"

  - type: CUE
    at: 2740
    cue_id: mood.wonder.single

  - type: MESSAGE
    at: 2840
    audience: broadcast
    message: "<dark_gray>  ↳ mood.wonder.single  ·  reverent  ·  overhead  ·  the pause is the point</dark_gray>"


  # ═══════════════════════════════════════════════════════════════════
  # LIFT TO HEIGHT  (T2900–T2960)
  # Player rises and slow_falling carries them through the finale.
  # ═══════════════════════════════════════════════════════════════════

  - type: MESSAGE
    at: 2900
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>One more thing.</gray>"

  - type: CUE
    at: 2960
    cue_id: fx.lift_to_height


  # ═══════════════════════════════════════════════════════════════════
  # HOUSELIGHTS UP  (T3020–T3200)
  #
  # ONE TIME_OF_DAY snap to 22500 (first horizon glow) — then let
  # the clock run naturally into dawn. No restore; show ends at dawn.
  # Player is at height and drifting down throughout.
  # ═══════════════════════════════════════════════════════════════════

  - type: MESSAGE
    at: 3020
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>The stage returns.</gray>"

  # Single snap — first light at the horizon, clock runs from here
  - type: TIME_OF_DAY
    at: 3040
    time: 22500

  - type: MESSAGE
    at: 3100
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>You were here for all of it.</gray>"

  - type: MESSAGE
    at: 3160
    audience: broadcast
    message: "<light_purple>[Sprite]</light_purple>  <gray>Until next time.</gray>"

  - type: CUE
    at: 3180
    cue_id: coda.curtain.quiet
