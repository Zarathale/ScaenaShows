# ScaenaShows v2 — Show: demo.archetype_sampler
# ─────────────────────────────────────────────────────────────────────
# ARCHETYPE SAMPLER — REVISION 6  (2026-03-24)
#
# Changes from Revision 5:
#   - Full aerial rewrite. Player aloft from C2 through end of show.
#   - Inline hover control using calibration-verified patterns:
#       HOVER  : amp 0 lev=20t gap=8t  cycle=28t (quasi-hover confirmed)
#       CLIMB  : amp 0 lev=20t gap=4t  cycle=24t (gentle ascent)
#       RELEASE: amp 1 lev=20t gap=24t cycle=44t (pressure-release descent)
#   - One persistent slow_falling from T=380 (3200t, covers full show).
#   - C2: amp-9 lift then hover through C3 (held at altitude ~12b).
#   - C4: pressure-release descent to ~8b (controlled, deliberate).
#   - C5: hover at 8b — cave sound from above.
#   - C6: climb back to 12b during silence.
#   - C7: strong amp-9 lift to ~20b (dramatic arrival from below).
#   - C8: hover at altitude — joy burst, elevated.
#   - C9: pressure-release descent through fireworks.
#         Player descends FROM above through the firework display.
#         Firework y_offsets redesigned to wrap around 15-20b altitude.
#   - C10: continue descent via pressure-release.
#   - C11: amp-9 re-lift for wonder single overhead.
#   - C12: fx.lift_to_height (unchanged).
#   - C13: narrated slow descent (fx.lift_to_height slow_fall carries it).
#   - Small narration edits throughout to reflect aerial staging.
#
# Structure:
#   T0–380       C1: HOUSELIGHTS DOWN     — ground · dusk · ritual
#   T380–840     C2: Ember Drift          — lift begins · hover ~12b
#   T840–1060    C3: Warm Light           — hover held · warmth from below
#   T1060–1280   C4: Cool Light           — pressure release descent
#   T1280–1480   C5: Cave Sound           — hover ~8b · sound without ground
#   T1480–1660   C6: Pause               — climb to 12b · anticipation
#   T1660–1880   C7: Dramatic Arrival     — strong lift to ~20b
#   T1880–2100   C8: Joy Burst            — hover at altitude · elevated joy
#   T2100–2360   C9: Daylight Burst       — inside fireworks · descent through light
#   T2360–2680   C10: Warm Ramp           — pressure release · ramp as descent
#   T2680–2900   C11: Wonder Single       — re-lift · single overhead firework
#   T2900–3040   C12: Lift to Height      — maximum lift · silence before close
#   T3040–3440   C13: Descent + Coda      — narrated airborne close
#
# Runtime: ~3440 ticks (~2:52)
# ─────────────────────────────────────────────────────────────────────

id: demo.archetype_sampler
