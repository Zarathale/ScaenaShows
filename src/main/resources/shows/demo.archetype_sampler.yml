# ScaenaShows v2 — Show: demo.archetype_sampler
# ─────────────────────────────────────────────────────────────────────
# ARCHETYPE SAMPLER — REVISION 7  (2026-03-25)
#
# Core change from R6: altitude is narrative, not mechanical.
# Height is withheld, foreshadowed, and revealed once — at C7.
# Every vertical change has a dramatic answer: why now, why this direction.
#
# Key differences from R6:
#   - C1: starts at day (TIME_OF_DAY 8000), steps to night over 300 ticks
#         Dialogue fires while lights are still visibly dimming
#   - C2: NO amp-9 burst. Hover near ground (0-2 blocks).
#         Player barely floating. Embers surround them, not below them.
#         Text trimmed to 3 lines (removed ACTION_BAR counterpoints).
#   - C3: CLIMB begins (2-6 blocks). Warm light is genuinely below them now.
#   - C4: HOVER at 6-7 blocks. Cool bloom at/near player level.
#   - C5: HOVER at 7-9 blocks. Cave sound ascending toward them from below.
#   - C6: CLIMB to 12-14 blocks. Silence. The rising is unannounced.
#   - C7: amp-9 LIFT IS EARNED HERE — arrival takes the player up.
#         First dramatic height. 14→25 blocks. Player is aware it happened.
#   - C8: HOVER at 25 blocks. Joy burst is below — elevated observer.
#   - C9: Pressure-release descent from 25→18b THROUGH fireworks.
#         Firework y_offsets: 26/20/12/24/16 — spans player at 18-25b.
#   - C10: Continue release descent 18→8b. Ramp builds as they return.
#   - C11-C13: unchanged from R6 except timing shift.
#
# Altitude arc: 0 → 2 → 6 → 7 → 9 → 14 → 25 → 18 → 8 → 14 → 35+ → 0
#
# Runtime: 3500 ticks (~175s / ~2m55s)
# ─────────────────────────────────────────────────────────────────────

id: demo.archetype_sampler
name: "Archetype Sampler"
description: "R7 — altitude dramaturgy rewrite. Height withheld, then earned. Embers at body level, arrival lifts you, inside fireworks at peak."
duration_ticks: 3500

portable: true
