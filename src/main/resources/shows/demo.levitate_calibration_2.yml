id: demo.levitate_calibration_2
name: "Levitate Calibration v2 — Wide Range"
description: >
  Redesigned calibration suite with dramatically wider parameter spread.
  Six sections covering the full range of levitate + slow_fall.
  A: 1 pulse amp 0 (absolute floor — probably zero airtime)
  B: amp 1 × 60t burst (gentle single lift)
  C: amp 3 × 120t burst (strong single lift)
  D: amp 9 × 240t burst (maximum sustained lift — the ceiling)
  E: 20 rhythmic pulses × amp 1 (progressive pulse climb)
  F: 40 rapid micro-pulses × amp 0, 10t each (near-continuous low-amp)
  PLAYER_FLIGHT not tested in this show. Pure levitation + slow_fall only.
  Report landing second for each section. ">25s" if still airborne at end of timer.
portable: true
default_mode: static
default_audience: participants
group_count: 1
group_strategy: join_order
tags: [test, calibration, aerial, effect-driven]
meta:
  created_by: Zara
  created_at: 2026-03-24
  last_edited_by: Zara
  last_edited_at: 2026-03-24
bossbar:
  enabled: true
  title: "<gray>Levitate Cal v2</gray>"
  color: WHITE
  overlay: PROGRESS
  audience: participants
  fade_in_ticks: 10
  fade_out_ticks: 20
# Total duration: 3840 ticks (~192 seconds / ~3.2 minutes)
duration_ticks: 3840
timeline:

  # ─────────────────────────────────────────────────────────────────────
  # INTRO
  # ─────────────────────────────────────────────────────────────────────
  - at: 0
    type: WEATHER
    mode: clear
  - at: 0
    type: MESSAGE
    text: "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
    audience: participants
  - at: 5
    type: MESSAGE
    text: "<white><bold>Levitate Calibration v2</bold></white>"
    audience: participants
  - at: 15
    type: MESSAGE
    text: "<gray>A=floor  B=gentle  C=strong  D=max  E=pulse  F=rapid</gray>"
    audience: participants
  - at: 35
    type: MESSAGE
    text: "<gray>Note your landing second for each. '>25s' if timer runs out.</gray>"
    audience: participants
  - at: 55
    type: MESSAGE
    text: "<gray>Pings every second. Bell at 5s/10s/15s/20s/25s.</gray>"
    audience: participants

  # ═══════════════════════════════════════════════════════════════════════
