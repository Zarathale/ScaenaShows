id: opening
name: "Opening"
duration_ticks: 200

scene_text: "<gold>Happy Birthday!</gold>"

events:
  - at: 0
    type: MESSAGE
    audience: broadcast
    message: "<gold>🎂 Happy Birthday!</gold> <gray>Press <white>F5</white> a couple times for the best view.</gray>"

  - at: 10
    type: SOUND
    sound: { id: "minecraft:block.bell.use", category: master, volume: 1.0, pitch: 1.0 }

  - at: 20
    type: EFFECT
    effect: { id: "glowing", duration_ticks: 21600, amplifier: 0, hide_particles: true }

  - at: 40
    type: PARTICLE
    particle: { id: "minecraft:heart", count: 12, offset: [0.5, 0.8, 0.5], extra: 0.0, force: true }

  # Hearts every 2s for the whole scene
  - at: 60
    type: PARTICLE
    particle: { id: "minecraft:heart", count: 18, offset: [0.8, 1.0, 0.8], extra: 0.0, force: true }
  - at: 80
    type: PARTICLE
    particle: { id: "minecraft:heart", count: 18, offset: [0.8, 1.0, 0.8], extra: 0.0, force: true }
  - at: 100
    type: PARTICLE
    particle: { id: "minecraft:heart", count: 18, offset: [0.8, 1.0, 0.8], extra: 0.0, force: true }
  - at: 120
    type: PARTICLE
    particle: { id: "minecraft:heart", count: 18, offset: [0.8, 1.0, 0.8], extra: 0.0, force: true }
  - at: 140
    type: PARTICLE
    particle: { id: "minecraft:heart", count: 18, offset: [0.8, 1.0, 0.8], extra: 0.0, force: true }
  - at: 160
    type: PARTICLE
    particle: { id: "minecraft:heart", count: 18, offset: [0.8, 1.0, 0.8], extra: 0.0, force: true }
  - at: 180
    type: PARTICLE
    particle: { id: "minecraft:heart", count: 18, offset: [0.8, 1.0, 0.8], extra: 0.0, force: true }

  # Light sparkle bed
  - at: 40
    type: PARTICLE
    particle: { id: "fireworks_spark", count: 10, offset: [0.6, 0.9, 0.6], extra: 0.0, force: true }
  - at: 70
    type: PARTICLE
    particle: { id: "fireworks_spark", count: 10, offset: [0.6, 0.9, 0.6], extra: 0.0, force: true }
  - at: 100
    type: PARTICLE
    particle: { id: "fireworks_spark", count: 10, offset: [0.6, 0.9, 0.6], extra: 0.0, force: true }
  - at: 130
    type: PARTICLE
    particle: { id: "fireworks_spark", count: 10, offset: [0.6, 0.9, 0.6], extra: 0.0, force: true }
  - at: 160
    type: PARTICLE
    particle: { id: "fireworks_spark", count: 10, offset: [0.6, 0.9, 0.6], extra: 0.0, force: true }

  # A few close fireworks to kick things off
  - at: 60
    type: SEQUENCE
    sequence: confetti_pop
  - at: 120
    type: SEQUENCE
    sequence: bday_sparkle_cascade

  - at: 40
    type: SOUND
    sound: { id: "minecraft:block.note_block.chime", category: master, volume: 2.0, pitch: 1.0 }
