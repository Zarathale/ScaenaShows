name: ScaenaShows
main: com.scaena.shows.ScaenaShowsPlugin
version: ${version}
api-version: '1.21'
author: Scaena
description: Data-driven choreographed show engine — Cue model (v2).
commands:
  show:
    description: Play/stop/reload ScaenaShows
    usage: /show <list|play|stop|stopall|reload>
permissions:
  scae.shows.admin:
    description: Full access to ScaenaShows commands and bypass cooldown.
    default: op
  scae.shows.play:
    description: Allow playing shows.
    default: true
  scae.shows.target.others:
    description: Allow targeting other players.
    default: op
  scae.shows.target.all:
    description: Allow targeting @a.
    default: op
  scae.shows.private:
    description: Allow using --private flag.
    default: op
  scae.shows.cooldown.bypass:
    description: Bypass show cooldown.
    default: op
  scae.shows.scenes:
    description: Allow using --scenes (director mode) flag.
    default: op
