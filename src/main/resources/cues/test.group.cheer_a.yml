# ScaenaShows v2 — Cue: test.group.cheer_a
# Personal message + sound for Group 1 (Gold team).
# Referenced by GROUP_EVENT in the test show to confirm group-scoped delivery.
# When this cue fires, "broadcast" and "participants" resolve only to Group 1 members.

id: test.group.cheer_a
name: "Test — Group A Cheer"
description: "Personalized message and sound for Group 1 (Gold). Verifies GROUP_EVENT audience scoping."
duration_ticks: 40
tags: [tone:warm, arc:moment]

timeline:

  # Message visible only to Group 1 members (audience resolved by GROUP_EVENT scope)
  - type: MESSAGE
    at: 0
    audience: participants
    message: "<gold><bold>GROUP A</bold></gold> <yellow>— You're on the Gold team! This message is only for you.</yellow>"

  # Short title card confirming group assignment
  - type: TITLE
    at: 0
    audience: participants
    title: "<gold>⭐ GROUP A ⭐</gold>"
    subtitle: "<gray>Gold team — group-scoped delivery</gray>"
    fade_in: 5
    stay: 30
    fade_out: 10

  # Note block chime — high pitch for Group A
  - type: SOUND
    at: 5
    sound_id: "minecraft:block.note_block.pling"
    category: master
    volume: 1.0
    pitch: 1.5

  # Action bar confirms which group this is
  - type: ACTION_BAR
    at: 10
    audience: participants
    message: "<gold>◆ Group A ◆</gold>"
    duration_ticks: 30
