# motif.still.chord
# Sustained A minor chord: A4 + C5 + E5 on pling (electric piano)
# The room's response to a weighted moment. Not loud — interior. A single color held.
# All three voices fire simultaneously at T=0. Duration: 60 ticks (3 seconds).
# Use: after a still peak, not during it. Fire after text has landed and silence has held
# for at least 20 ticks. The chord exhales — it doesn't compete with the moment.
# Volume tapers from root to fifth so the chord has body without the upper notes overpowering.
