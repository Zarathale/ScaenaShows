# fx.lift_to_height
# Lifts the player ~20-25 blocks and carries them on slow_falling for the next 40 seconds.
#
# Ascent: Levitation III (amplifier 2) for 120 ticks (~6s) — reaches visible altitude.
# Descent: slow_falling holds them for 40 seconds after peak.
#          The show's narration fires DURING the descent; the show can end
#          while the player is still airborne — stop safety extends slow_falling further.
#
# Intended use: invoke ~180 ticks before the first closing narration line.
# Do NOT pair with fx.levitate_and_drift — use one or the other per show.
id: fx.lift_to_height
tags: [dreamy, ethereal, reverent, medium, slow, transition, effect-driven, sound-accented, moment, single, centered, subtle, revelation, ceremony]
timeline:
  # A low, soft tone — something is about to change
  - type: SOUND
    at: 0
    sound_id: "minecraft:entity.experience_orb.pickup"
    category: master
    volume: 0.55
    pitch: 0.60

  # Levitation III for 120 ticks (~6s): lifts ~20-25 blocks
  - type: EFFECT
    at: 2
    effect_id: levitation
    duration_ticks: 120
    amplifier: 2
    hide_particles: false
    audience: participants

  # Slow_falling kicks in just before levitation expires — player glides at peak
  # Duration: 800 ticks (40s) — enough to carry through the entire closing narration
  # and into natural landing after the show formally ends
  - type: EFFECT
    at: 115
    effect_id: slow_falling
    duration_ticks: 800
    amplifier: 0
    hide_particles: true
    audience: participants

  # A soft chime as the player reaches peak height — the top of the arc
  - type: SOUND
    at: 118
    sound_id: "minecraft:block.amethyst_block.hit"
    category: master
    volume: 0.40
    pitch: 1.30
