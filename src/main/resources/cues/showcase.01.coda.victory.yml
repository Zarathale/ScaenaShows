id: showcase.01.coda.victory
name: "Victory Coda — showcase.01"
description: >
  Post-fight victory coda. Fires on Vindicator death via BOSS_HEALTH_BAR
  death injection. Levitation + fireworks. 160 ticks.
  PLACEHOLDER — final levitation amplifier and fireworks preset TBD at Gate 4.
duration_ticks: 160

tags: [tone:triumphant, tone:joyful, arc:coda, pace:building, duration:moment,
       effect:fireworks-light]

meta:
  created_by: Kendra
  created_at: 2026-03-31
  last_edited_by: Kendra
  last_edited_at: 2026-03-31

timeline:

  # Levitation — player lifts briefly.
  # OPEN ITEM [A]: amplifier TBD (Effects confirms ceiling clearance post-scouting).
  # Placeholder: amp 0 (gentle drift upward).
  - at: 0
    type: EFFECT
    effect_id: levitation
    duration_ticks: 80
    amplifier: 0
    hide_particles: false
    audience: participants

  # Victory fireworks — fired near vindicator_spawn (open sky).
  # OPEN ITEM [B]: final preset and pattern TBD (Mira proposes at Gate 4).
  # Placeholder: scae_large_fanfare burst.
  - at: 10
    type: FIREWORK
    preset: scae_large_fanfare
    offset: {x: 1.0, y: 0.0, z: -10.0}
    y_mode: surface
    y_offset: 6

  - at: 20
    type: FIREWORK
    preset: scae_star_warm
    offset: {x: -1.0, y: 0.0, z: -9.0}
    y_mode: surface
    y_offset: 8

  - at: 35
    type: FIREWORK
    preset: scae_large_fanfare
    offset: {x: 2.0, y: 0.0, z: -11.0}
    y_mode: surface
    y_offset: 7

  - at: 55
    type: FIREWORK
    preset: scae_star_warm
    offset: {x: 0.0, y: 0.0, z: -12.0}
    y_mode: surface
    y_offset: 9

  # Slow fall — player drifts back down after levitation.
  - at: 80
    type: EFFECT
    effect_id: slow_falling
    duration_ticks: 80
    amplifier: 0
    hide_particles: true
    audience: participants

  - at: 90
    type: REST
    duration_ticks: 70
    name: "victory coda — let it land"
