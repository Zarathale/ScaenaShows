# fx.levitate_and_drift
# Lift participants into the air with levitation, then switch to slow_falling.
# Total air time ~7 seconds (rise 2s, drift down 5s).
# Use at moments of awe, transition, or climax.
# Safe — no fall damage; slow_falling ensures a gentle landing.
# Pair with a TITLE or FIREWORK in the parent show for maximum impact.
id: fx.levitate_and_drift
timeline:
  - type: SOUND
    at: 0
    sound_id: "minecraft:entity.experience_orb.pickup"
    category: master
    volume: 0.7
    pitch: 0.8
  - type: EFFECT
    at: 2
    effect_id: levitation
    duration_ticks: 40
    amplifier: 1
    hide_particles: false
    audience: participants
  # Slow falling takes over as levitation expires
  - type: EFFECT
    at: 42
    effect_id: slow_falling
    duration_ticks: 100
    amplifier: 0
    hide_particles: true
    audience: participants
  - type: SOUND
    at: 42
    sound_id: "minecraft:block.amethyst_block.hit"
    category: master
    volume: 0.5
    pitch: 1.2
